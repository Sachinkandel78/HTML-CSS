 <!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design this layout</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        body {
            background-color: rgb(233, 220, 234);
        }

        .nav {
            background-color: blue;
        }

        ol {
            list-style: none;
            display: flex;
        }

        li {
            color: white;
            padding: 5px 18px;
            font-size: 10px;
            font-weight: bold;

        }

        .nepal {
            border: 2px solid red;
            width: 200px;
            height: 150px;
            padding: 5px;
            margin: 10px;
            background-color: rgb(173, 215, 241);
        }

        .japan {
            border: 2px solid red;
            width: 200px;
            height: 150px;
            padding: 5px;
            margin: 10px;
            background-color: greenyellow;
        }

        .match {
        display: flex;
        background-color: blueviolet;
        margin: 5px;
        }
        .footer{
            border: 2px solid black;
            background-color: rgb(248, 248, 244);
            padding: 2px;
        }
         img{
            position: fixed;
            left: 470px;
            top: 190px;
            height: 20px;
            border: 2px solid white;
        }
        .rectangle
        {
            border: 2px solid gray;
            width: 200px;
            /* height: 30px; */
            border-radius: 10px;
            color: white;
            padding: 5px;
            margin-left: 170px;
            
        }
        .segment{
            background-color: black;
        }
    </style>
</head>

<body>
    <div class="nav">
        <ol>
            <li>Home</li>
            <li>About</li>
            <li>Contact Us</li>
        </ol>
    </div>
    <div class="match">
        <div class="nepal">
            Nepal vs Kuwait Cricket match
        </div>

        <div class="japan">
            Nepal vs Japan match
        </div>
    </div>
    <div class="segment">  <img src="https://im.rediff.com/cricket/2022/sep/08vk.gif" alt="" width="20px" >
        <div class="rectangle">Welcome to sigma course
            
        </div>
        <div class="footer">
           
        I am footer
         </div>
    </div>
</body>

</html>
