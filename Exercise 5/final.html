<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design of Layout</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        header{
            position: sticky;
            top: 0;
        }
        nav{
            background-color: pink;
            height: 43px;
            /* position: sticky; */
        }
        main{
            background-color: black;
            color: white;
        }
        ol{
            display: flex;
            list-style: none;
        }
        li{
            padding: 10px;
        }
        .container
        {
              background-color: green;
            margin: 12px 34px;
            padding: 53px 23px;
            text-align: center;
            display: flex;
        }
        .box1{
            background-color: bisque;
            height: 70vh;
            width: 45%;
            margin: 0 12px;
        }
        .box2{
            background-color: blue;
            height: 70vh;
            width: 45%;
            margin: 0 12px;
        }
        .text-box {
            padding: 34px;
            border: 2px solid white;
            margin: 50px 34vw;
            font-size: 2em;
            border-radius: 13px;
        }
        .logo{
              height: 32px;
            width: 32px;
            background: orange;
            position: fixed;
            bottom: 12px;
            right: 23px;
            border-radius: 60px;
        }
        footer{
            height: 100px;
            background-color: aliceblue;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ol>
                <li>Home</li>
                <li>About</li>
                <li>Contact</li>
            </ol>
        </nav>
    </header>
    <main>
        <div class="container">
            <div class="box1"></div>
            <div class="box2"></div>
        </div>
        <div class="text-box">
            <p>welcome to sigma web development course</p>
        </div>
        <div class="logo">

        </div>
    </main>
    <footer></footer>
</body>
</html>
