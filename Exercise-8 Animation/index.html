<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            color: aliceblue;
            height: 121px;
            width: 121px;
            background-color: rgb(32, 2, 202);
            border-radius: 70px;
            position: absolute;
            bottom: 0;
            left: 0;
            animation: animateX 30s linear infinite,animateY 1s ease-out infinite alternate ;
            /* animation: name duration timing-function delay iteration-count direction fill-mode; */
        }
        .box1{
            color: aliceblue;
            height: 121px;
            width: 121px;
            background-color: rgb(7, 239, 185);
            border-radius: 70px;
            position: absolute;
            bottom: 0;
            left: 0;
            animation: animateX 10s linear infinite,animateY 3s ease-out infinite alternate-reverse ;
            /* animation: name duration timing-function delay iteration-count direction fill-mode; */
        }
        

        .container {
            position: relative;
            height: 80vh;
            width: 80vw;
            background-color: rgb(20, 15, 20);

        }

        @keyframes animateY {
            from {
                    bottom: 0;
            }

            to {
               
                bottom: 100%;
              
            }
        }

        @keyframes animateX {
            from {
                left: 0;
            }

            to {
                left: 100%;
              
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="box">Sa
            <div class="box1">Chi</div>
        </div>
    </div>
     
   
     
</body>

</html>
