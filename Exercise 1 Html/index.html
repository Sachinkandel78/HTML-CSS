<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Exercise 1-HTML</title>
</head>
<body>
    <!-- You are given 12 files;6 audios and 6 videos.
    Design a website using HTML only which shows these 12 files.
    1.mp3 2.mp3 ------ 6.mp3
    1.mp4 2.mp4 ------ 6.mp4 -->
    <h1>My videos and audios for the day</h1>
    <h2>Videos</h2>
    <div>
        <video width="400" height="200" src="1.mp4" controls></video>
        <video width="400" height="200" src="2.mp4" controls></video>
        <video width="400" height="200" src="3.mp4" controls></video>
        <video width="400" height="200" src="4.mp4" controls></video>
        <vide width="400" height="200" src="5.mp4" controls></video>
        <video width="400" height="200" src="6.mp4" controls></video>
    </div>
    <h2>Audios</h2>
    <div>
        <audio src="1.mp3" controls></audio>
        <audio src="2.mp3" controls></audio>
        <audio src="3.mp3"controls></audio>
        <audio src="4.mp3"controls></audio>
        <audio src="5.mp3" controls></audio>
        <audio src="6.mp3"controls></audio>
        
    </div>
</body>
</html>
