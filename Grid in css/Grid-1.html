<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid in CSS</title>
    <style>
        .container{
            width: 80vw;
            height: 50vh;
            border: 2px solid black;
            display: grid;
             grid-template-columns: 1fr 1fr 1fr;
             /* grid-template-columns: repeat(4,1fr); */
             /* grid-template-columns: 130px 180px;  */
            /* grid-template-rows: 100px 100px 100px;  */
            gap: 20px 5px;
            /* justify-items: center; */
            align-items: center;
            /* justify-content: end; */
        }
        .items{
            background-color: blue;
            height: 85px;
            /* width: 120px; */
            border: 2px solid red;
            color: white;
            font-weight: bold;
        }
        .item-4{
            grid-row: 1/2;
            grid-column: 1/2;
            /* 1 dekhi suru vayera 2 samma jawos */
        }
        .item-1{
            grid-row: 1/2;
            grid-column: 1/2;
            /* overlap vayo 1 rw 4 */
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="items item-1">1</div>
        <div class="items">2</div>
        <div class="items">3</div>
        <div class="items item-4">4</div>
        <div class="items">5</div>
    </div>
</body>

</html>
